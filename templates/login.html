{% extends "base.html" %}
{% block content %}

<section class="hero">
    <div class="hero-main">
        <h1 class="hero-title">Login</h1>
        <p class="hero-subtitle">
            Access your saved cities and personalized weather dashboard.
        </p>
    </div>
</section>

<section class="content-section">
    <div class="card" style="max-width: 520px; margin: 0 auto;">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div style="margin-bottom: .8rem; padding: .75rem; border-radius: 12px; background: rgba(255,107,107,.12); border:1px solid rgba(255,107,107,.25); color: var(--fg);">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <h2 class="section-title">Welcome back</h2>

        <form method="post" action="{{ url_for('login') }}" style="display:flex; flex-direction:column; gap:.9rem; margin-top:.75rem;">
            <div>
                <label for="email" class="metric-label" style="display:block; margin-bottom:.35rem;">Email</label>
                <input id="email" name="email" type="email" required class="search-input" style="width:100%; border-radius:12px;">
            </div>

            <div>
                <label for="password" class="metric-label" style="display:block; margin-bottom:.35rem;">Password</label>
                <input id="password" name="password" type="password" required class="search-input" style="width:100%; border-radius:12px;">
            </div>

            <button type="submit" class="primary-button" style="width:fit-content;">Login</button>
        </form>

        <p class="card-caption" style="margin-top: 1rem;">
            Don’t have an account?
            <a href="{{ url_for('register') }}" class="nav-link" style="padding:.2rem .35rem;">Register</a>
        </p>
    </div>
</section>

{% endblock %}
